name: Meta Ads Data Collector

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Start date (YYYY-MM-DD). Leave blank to use the collector's default."
        required: false
        type: string
      until:
        description: "End date (YYYY-MM-DD). Leave blank to use the collector's default."
        required: false
        type: string
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

defaults:
  run:
    working-directory: meta-ai-command-center

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Meta Ads collector
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ARGS=()

          if [ -n "${{ inputs.since }}" ]; then
            ARGS+=(--since "${{ inputs.since }}")
          fi

          if [ -n "${{ inputs.until }}" ]; then
            ARGS+=(--until "${{ inputs.until }}")
          fi

          python meta_collector.py "${ARGS[@]}"

      - name: Validate collected data
        run: |
          python validate_output.py \
            --csv data/meta_campaign_daily.csv \
            --metadata data/collection_metadata.json

      - name: Run deterministic performance analyzer
        run: python performance_analyzer.py

      - name: Run AI analyst
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python ai_analyst.py

      - name: Generate Excel report
        run: python excel_report.py

      - name: Validate Excel report
        run: python validate_excel_report.py

      - name: Send email report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL_TO: ${{ vars.REPORT_EMAIL_TO }}
          REPORT_EMAIL_FROM: ${{ vars.REPORT_EMAIL_FROM }}
        run: python send_email_report.py

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-campaign-daily-${{ github.run_id }}
          path: meta-ai-command-center/data/meta_campaign_daily.csv
          retention-days: 90
          if-no-files-found: warn

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-performance-analysis-${{ github.run_id }}
          path: |
            meta-ai-command-center/data/performance_findings.json
            meta-ai-command-center/reports/
          retention-days: 90
          if-no-files-found: warn
